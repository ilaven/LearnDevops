<!-- auth-page wrapper -->
<div class="auth-page-wrapper auth-bg-cover pt-5  min-vh-100">
    <div class="bg-overlay"></div>
    <!-- auth-page content -->
    <div class="auth-page-content overflow-hidden pt-lg-1 px-lg-1">
        <div class="container-fluid">
            <div class="row">
                <div class="col-lg-12">
                    <div class="card1 overflow-hidden card-bg-fill galaxy-border-none">
                        <div class="row px-5 g-0">
                            <div class="col-lg-7 col-md-6 col-12 left-section">
                                <div class="mb-3 pb-3">
                                    <a routerLink="" class="d-block">
                                        <img src="assets/images/logo-light.svg" alt="" height="70">
                                    </a>
                                </div>

                                <div class="h-80 mt-5">
                                    <div class="position-relative h-80 d-flex flex-column">
                                        <div class="loginTitle mt-4">
                                            <h4>Welcome to the</h4>
                                            <h2>Parcel Intelligence Platform™</h2>
                                            <h3>Your Gateway to Total Parcel Savings (TPS)</h3>

                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- end col -->
                            
                            <div class="col-xxl-4 col-xl-4 col-lg-4 col-md-6 mt-5 col-12 mt-5 mx-4 px-1 pt-4">
                                <div class="p-lg-4 p-4 bg_whiteColor mt-2">
                                    <div class="text-center pt-2">
                                        <svg width="88" height="88" viewBox="0 0 88 88" fill="none" class="iconBg"
                                            xmlns="http://www.w3.org/2000/svg">
                                            <g clip-path="url(#clip0_1069_191)">
                                                <path
                                                    d="M87.6206 43.8103C87.6206 55.5687 82.988 66.2452 75.4486 74.1141C67.4744 82.4381 56.2474 87.6206 43.8103 87.6206C31.3732 87.6206 20.1462 82.4381 12.1719 74.1141C4.63254 66.2452 0 55.5687 0 43.8103C0 19.6148 19.6148 0 43.8103 0C68.0058 0 87.6206 19.6148 87.6206 43.8103Z"
                                                    fill="#2C77C4" />
                                                <path
                                                    d="M43.8099 50.575C53.6946 50.575 61.7078 42.5618 61.7078 32.6771C61.7078 22.7924 53.6946 14.7793 43.8099 14.7793C33.9252 14.7793 25.9121 22.7924 25.9121 32.6771C25.9121 42.5618 33.9252 50.575 43.8099 50.575Z"
                                                    fill="url(#paint0_radial_1069_191)" />
                                                <path
                                                    d="M75.4485 74.1142C67.4743 82.4381 56.2473 87.6206 43.8102 87.6206C31.3731 87.6206 20.1461 82.4381 12.1719 74.1142C16.6751 60.9695 29.1395 51.5205 43.8102 51.5205C58.4809 51.5205 70.9453 60.9695 75.4485 74.1142Z"
                                                    fill="url(#paint1_radial_1069_191)" />
                                            </g>
                                            <defs>
                                                <radialGradient id="paint0_radial_1069_191" cx="0" cy="0" r="1"
                                                    gradientUnits="userSpaceOnUse"
                                                    gradientTransform="translate(39.6668 26.3724) scale(26.2185 26.2185)">
                                                    <stop stop-color="white" />
                                                    <stop offset="1" stop-color="#D1D1D1" />
                                                </radialGradient>
                                                <radialGradient id="paint1_radial_1069_191" cx="0" cy="0" r="1"
                                                    gradientUnits="userSpaceOnUse"
                                                    gradientTransform="translate(36.4858 63.2123) scale(36.8246 36.8246)">
                                                    <stop stop-color="white" />
                                                    <stop offset="1" stop-color="#D1D1D1" />
                                                </radialGradient>
                                                <clipPath id="clip0_1069_191">
                                                    <rect width="87.6206" height="87.6206" fill="white" />
                                                </clipPath>
                                            </defs>
                                        </svg>

                                    </div>

                                    <div class="mt-4">
                                        <p class="errorMsg">{{error_text()}}</p>
                                        <form [formGroup]="clientProfileFormGroup" (ngSubmit)="checkLogin()">

                                            <div class="mt-2">
                                                <div class="input-group" data-input-flag
                                                    data-option-countrycode="false">
                                                    <div class="btn btn-light border blueBackground">
                                                        <i class=" ri-user-3-line"></i>
                                                    </div>
                                                    <input name="email" type="email"
                                                        class="form-control rounded-end flag-input"
                                                        placeholder="Username" aria-label="Username"
                                                        formControlName="userName" required="required">
                                                </div>
                                            </div>

                                            <div class="mt-3">
                                                <div class="input-group" data-input-flag
                                                    data-option-countrycode="false">
                                                    <div class="btn btn-light border blueBackground">
                                                        <i class="  ri-lock-2-line"></i>
                                                    </div>
                                                    <input name="password" type="email"
                                                        class="form-control rounded-end flag-input"
                                                        placeholder="Password" aria-label="Password"
                                                        formControlName="password" required="required"
                                                        [type]="fieldTextType ? 'text' : 'password'">
                                                    <button
                                                        class="btn btn-link position-absolute end-0 top-0 text-decoration-none text-muted password-addon material-shadow-none"
                                                        type="button" id="password-addon"><i class="mdi align-middle"
                                                            [ngClass]="{'mdi-eye-off-outline': !fieldTextType, 'mdi-eye-outline': fieldTextType  }"
                                                            (click)="toggleFieldTextType()"></i></button>
                                                </div>
                                            </div>

                                            <div class="form-check mt-3">
                                                <input class="form-check-input" type="checkbox" id="rememberme"
                                                    formControlName="rememberMe">
                                                <label class="form-check-label" for="rememberme">Remember me</label>
                                            </div>

                                            <div class="mt-3">
                                                <button class="btn btn-primary w-100 blueBackground"
                                                    type="submit">Login</button>
                                            </div>

                                            <div class="mt-5 text-center py-2">

                                                <div class="d-flex gap-2 justify-content-center">
                                                    <button type="button"
                                                        class="btn btn-primary btn-icon waves-effect waves-light noborder"><img
                                                            src="../../../assets/images/icons/ups.png"
                                                            class="serviceLogo"></button>
                                                    <button type="button"
                                                        class="btn btn-danger btn-icon waves-effect waves-light noborder"><img
                                                            src="../../../assets/images/icons/fedex.png"
                                                            class="serviceLogo"></button>
                                                    <button type="button"
                                                        class="btn btn-info btn-icon waves-effect waves-light noborder"><img
                                                            src="../../../assets/images/icons/ontrc.png"
                                                            class="serviceLogo"></button>
                                                    <button type="button"
                                                        class="btn btn-dark btn-icon waves-effect waves-light noborder"><img
                                                            src="../../../assets/images/icons/dhl.png"
                                                            class="serviceLogo"></button>
                                                    <button type="button"
                                                        class="btn btn-info btn-icon waves-effect waves-light noborder"><img
                                                            src="../../../assets/images/icons/usps.png"
                                                            class="serviceLogo"></button>

                                                </div>
                                            </div>

                                        </form>
                                    </div>

                                </div>
                            </div>
                            <!-- end col -->
                        </div>
                        <!-- end row -->
                    </div>
                    <!-- end card -->
                </div>
                <!-- end col -->

            </div>
            <!-- end row -->
        </div>
        <!-- end container -->
    </div>
    <!-- end auth page content -->
    <ng-template #centerDataModal let-modal>
        <div class="modal-body text-center p-5">
            <lord-icon src="https://cdn.lordicon.com/hrqwmuhr.json" trigger="loop"
                colors="primary:#121331,secondary:#08a88a" style="width:120px;height:120px"></lord-icon>
            <div class="mt-4">
                <h4 class="mb-3">Oops something went wrong!</h4>
                <p class="text-muted mb-4"> The transfer was not successfully received by us. the email of the recipient
                    wasn't correct.</p>
                <div class="hstack gap-2 justify-content-center">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal"
                        (click)="modal.close('Close click')">Close</button>
                    <a href="javascript:void(0);" class="btn btn-danger">Try Again</a>
                </div>
            </div>
        </div>
    </ng-template>
</div>
<!-- end auth-page-wrapper -->
