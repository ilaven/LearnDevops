<div class="px-0 pt-0 py-0">





  <!-- card -->
  <div class="card m-0 popup-design shadow-none card-height-100">
    <div class="card-header border-0 align-items-center d-flex">
      <h4 class="card-title mb-0 flex-grow-1 title-sty"></h4>
      <button matSuffix type="button" (click)="close()"
        class="bit_eye_icon btn btn-link p-0 text-decoration-none text-muted material-shadow-none">
        <img src="assets/images/close_icon.svg" class="close_icon" alt="close icon" />
      </button>
    </div><!-- end card header -->

    <!-- card body -->
    <div class="card-body pt-2 pb-3">

      <div class="popup-header text-center">
        <img src="assets/images/ljm-popouplogo.svg" alt="LJM Group Logo" class="logo" />


        <p class="title text-center">
          {{clientName}} <br>Total {{carrierType}} Agreement Savings
        </p>

        <p class="subtitle">View Savings Details</p>

        <div class="button-container my-3">
          <button mat-raised-button color="primary" matTooltip="Click Here to View Savings" type="button"
            (click)="ContractPopup_clickHandler()" class="savings-button">
            {{totalCost | currency:'USD':true:'1.2-2'}}
          </button>
        </div>

        <p class="footer-text">
          LJM Group is consistently monitoring your shipping trends to help you maintain a best-in-class agreement.
          Please contact us anytime at: <strong>631-844-9500</strong>
        </p>
      </div>
    </div>
    <!-- end card body -->
  </div>
  <!-- end card -->
  <!-- end card -->
</div>
<!-- end col -->
<!-- end row -->
