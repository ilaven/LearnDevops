@if(isLoading()){
<div class="loader-overlay">
    <div class="loader-content">
        <img src="../../../../../assets/images/loader.gif" alt="Loading">
    </div>
</div>}
<div class="px-2 py-2">
    <div class="bg-pop-title">
        <div class="row">
            <div class="col-10">
                <h2 class="mat-dialog-title mt-2">Settings</h2>
                <h6 class="sub-title-txt"></h6>
            </div>
            <div class="col-2 p-0">
                <div mat-dialog-actions align="end" class="close-btn p-0">
                    <button mat-button (click)="close()"><img class="closeBtn"
                            src="../../../../../assets/images/svg/close.svg"></button>
                </div>
            </div>
        </div>
    </div>

    <div class="input_sty px-2 py-2">
        <div class="row">

            <div class="col-md-12 text-center">
                <button mat-raised-button color="primary" class="btn-save-pop btn_transform ms-0"
                    (click)="restoreProposal()">
                    <img src="assets/images/reset_icon.svg" /> reset to initial upload</button>
            </div>
        </div>
    </div>



    <div class="input_sty px-2 py-2">
        <div class="row">
            <div class="col-md-12 d-flex align-items-center">
                <div class="flex-grow-1">
                    <mat-label>Delete Agreement</mat-label>
                    <div *ngIf="scenariosDisplayedSignal().length > 0">
                        <div class="mt-2 DeleteAgreement "
                            style="height: 180px;overflow-y: auto;padding:10px;padding-left: 4px;">

                            <div *ngFor="let scenarios of scenariosDisplayedSignal();let rowIndex = index">
                                <div class="deleteAgg">
                                    <div
                                        style="height: 20px;display: flex; align-items: center;justify-content: space-between;">
                                        <div>{{scenarios.targetName}}</div>
                                        <div>
                                            <button mat-icon-button color="warn" type="button"
                                                style="line-height: 20px;" (click)="deleteTarget(scenarios.targetId)">
                                                <img src="../../../../assets/images/svg/delete.svg"
                                                    style="height: 20px;">
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div *ngIf="scenariosDisplayedSignal().length < 1">
                        <div class="mt-2 DeleteAgreement"
                            style="font-weight: 600;
                            padding: 15px 10px;
                            border-color: #f5f5f5;
                            border-radius: 4px;
                            margin: 10px;
                            font-family: 'Lato', sans-serif !important;
                            box-shadow: 0 0 1px rgba(169, 169, 169, 0.5), 0 0 1px rgba(169, 169, 169, 0.5), 0 0 10px rgba(169, 169, 169, 0.3), 0 0 1px rgba(169, 169, 169, 0.5);">
                            <div style="height: 20px;display: flex; align-items: center;">
                                <div style="display: flex;width: 100%;justify-content: center;">No Agreements Found
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>
