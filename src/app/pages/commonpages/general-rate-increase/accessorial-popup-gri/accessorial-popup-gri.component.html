<div class="px-2  py-2">
    <div class="bg-pop-title">
        <div class="row">
            <div class="col-10">
                <h2 class="mat-dialog-title mt-2">Edit Discounts</h2>
                <h6 class="sub-title-txt"> {{serviceName}}</h6>
            </div>
            <div class="col-2">
                <div mat-dialog-actions align="end" class="close-btn">
                    <button mat-button (click)="close()"><img class="closeBtn"
                            src="/assets/images/svg/close.svg"></button>
                </div>
            </div>
        </div>
    </div>

    <div class="tab_sty px-2 py-2">
        <div class="row">
            <div class="col-12">
                <h5 class="mb-3 fs-22 fw-semibold text-titles ">Discounts</h5>
                <div class="card card_shadow_box">
                    <div class="card-body pt-0 px-0 pb-0">
                        <div class="table-scroll create-tab tableWrap mt-0">
                            <table mat-table [dataSource]="dataSource"
                                class="mat-elevation-z1 w-full mt-0 border_table cont-sum-tab">

                                <ng-container *ngFor="let column of columns; let i = index"
                                    [matColumnDef]="column.fieldVal">
                                    <th mat-header-cell *matHeaderCellDef class="heading_main"
                                        style="padding: 0 20px;text-align: center;width:0px;"> {{ column.field }} </th>
                                    <td mat-cell *matCellDef="let row; let rowIndex = index"
                                        class="create-proposal-table " matTooltip="{{row[column.fieldVal]}}"
                                        [matTooltipPosition]="'after'"
                                        [matTooltipDisabled]="column.field=='Service'?false:true">
                                        <div style="display: flex;">
                                            <div *ngIf="column.fieldVal !='targetDisType'" class="w-100">
                                                <input matInput type="text" class="weightText weightRange"
                                                    value="{{(column.fieldVal == 'targetDis')?((row['targetDisType'] == '$')?((row['targetDis'] != '') ? (row['targetDis'] | currency:'USD' : 'symbol' : '1.2-2') : ''):(row['targetDis'] != '')?((row['targetDis'] | number :'1.2-2')+'%'):'0.00%'):row[column.fieldVal]}}"
                                                    style=""
                                                    [ngStyle]="{'text-align':(column.field == 'Service')?'left':'center'}"
                                                    (focusout)="(column.fieldVal == 'targetDis')?percentageFocusout($event,column.fieldVal,row['accRatesheetId'],rowIndex):otherFocusout($event,column.fieldVal,row['accRatesheetId'],rowIndex)"
                                                    (keypress)="(column.fieldVal == 'targetDis')?storePreviousPercentage($event,rowIndex):''"
                                                    (input)="(column.fieldVal == 'targetDis')?validatePercentage($event):''"
                                                    (keyup)="onChange($event,column.fieldVal,row['accRatesheetId'],rowIndex)">
                                            </div>
                                            <div *ngIf="(column.field == 'Service') && (row.isNewRow != undefined)">
                                                <a class="align-middle delete-link" (click)="removeRow(rowIndex)"
                                                    matTooltip="Delete">
                                                    <img src="/assets/images/svg/delete.svg" class="gridIcon"
                                                        alt="Delete">
                                                </a>
                                            </div>
                                        </div>
                                        <div style="text-align:center">
                                            <div class="w-100 DIMFactor" *ngIf="column.fieldVal =='targetDisType'">
                                                <mat-select [(ngModel)]="row.targetDisType"
                                                    (ngModelChange)="onMinChange($event)" class="weightTextSelect">
                                                    <mat-option *ngFor="let targetDisType of accDisTypeValues"
                                                        [value]="targetDisType">
                                                        {{targetDisType}}
                                                    </mat-option>
                                                </mat-select>
                                            </div>
                                        </div>
                                        <p style="margin:0px;padding: 0px;color: red;text-align:center;font-size:12px;font-family: 'Lato', sans-serif;text-transform: none;"
                                            *ngIf="saveButtonClicked && row[column.fieldVal] == '' && row[column.fieldVal] != '0'">
                                            Enter a Value</p>
                                    </td>
                                </ng-container>
                                <tr mat-header-row *matHeaderRowDef="displayedColumns;"></tr>
                                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                            </table>
                        </div>

                        <div class="col-12 mt-3 ps-1">
                            <button class="add_btn addbtnNewChange" (click)="AddNewRowAcc(serviceName)">
                                <img src="/assets/images/svg/add_btn.svg" class="add_btn_icon" alt="add">
                                <div class="ms-2 add_text_discount"> Add Discounts </div>
                            </button>
                        </div>

                    </div>
                </div>
            </div>


            <div class="col-12">
                <div class="d-flex justify-content-end">
                    <button mat-button class="btn-cancel" (click)="reset()">Reset</button>
                    <button mat-raised-button color="primary" class="btn-save" (click)="onSubmit()">Save</button>
                </div>
            </div>
        </div>




    </div>
