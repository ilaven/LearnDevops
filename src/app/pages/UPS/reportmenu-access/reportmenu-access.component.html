<div class="row">
    <div class="col">
        <div class="px-0 py-3">
            <div class="row header_section pb-1">
                <div class="col-12">
                    <div class="d-flex align-items-lg-center text-md-start text-center flex-lg-row flex-column">
                        <div class="col-lg-3 col-md-12 col-12">
                            <h4 class="fs-16 mb-1 pageTitle">User Access</h4>
                        </div>
                        <div class="col-12 col-md-5 mt-3 mt-lg-0"></div>

                        <div class="col-12 col-lg-4 ms-auto col-md-4 mt-3 mt-lg-0">
                            <div class="row g-3 mb-0 align-items-center justify-content-md-end justify-content-center">
                                <div class="col-8">
                                    <form [formGroup]="webUserDetailsformgroup">
                                        <mat-form-field appearance="outline" class="w-100 compact-field search_input">
                                            <span matPrefix class="search_icon">
                                                <i class="ri-search-line align-middle me-1"></i>
                                            </span>
                                            <input matInput placeholder="Search Client Name"
                                                formControlName="clientNameSelected" autocomplete="off"/>
                                        </mat-form-field>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="px-0 pt-0 py-3">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="card">
                            <div class="card-body p-1">
                                <div class="table-wrapper">
                                    <div class="top-scroll" #topScroll (scroll)="syncScroll($event, 'top')">
                                        <div class="scroll-content"></div>
                                    </div>

                                    <div class="table-scroll">
                                        <table class="metrics-table">
                                            <thead>
                                                <tr>
                                                <th class="sticky-header">Client Name</th>
                                                <th class="sticky-header">LJM Account Number</th>
                                                <th class="sticky-header">Status</th>
                                                <th class="sticky-header">Audit Status</th>
                                                <th class="sticky-header">Contract Status</th>
                                                <th class="sticky-header text-center">Action</th>
                                                </tr>
                                            </thead>

                                            <tbody>
                                                <tr *ngFor="let datagrid_iditem of dataGridClientList; let indexValue = index"
                                                [class.odd-row]="indexValue % 2 === 0" [class.even-row]="indexValue % 2 !== 0">
                                                    <th scope="row">{{ datagrid_iditem.clientName }}</th>
                                                    <td>{{ datagrid_iditem.crmAccountNumber }}</td>
                                                    <td><span [ngClass]="datagrid_iditem.status === 'ACTIVE' ? 'active' : 'inactive'" class="status-badge">
                                                        {{ datagrid_iditem.status }}</span>
                                                    </td>
                                                    <td><span [ngClass]="datagrid_iditem.auditstatus === 'ACTIVE' ? 'active' : 'inactive'" class="status-badge">
                                                        {{ datagrid_iditem.auditstatus }}</span>
                                                    </td>
                                                    <td><span [ngClass]="datagrid_iditem.contractstatus === 'ACTIVE' ? 'active' : 'inactive'" class="status-badge">
                                                        {{ datagrid_iditem.contractstatus }}</span>
                                                    </td>
                                                    <td style="text-align: center !important;">  
                                                        <button type="button" class="btn btn-info waves-light orange" 
                                                        (click)="burri_clickHandler(datagrid_iditem.clientId, datagrid_iditem.clientName)">Edit</button>
                                                    </td>
                                                </tr>
                                                <tr *ngIf="dataGridClientList.length === 0">
                                                    <td colspan="6" class="text-center py-3">No clients found</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
