<div class="modal-body text-center px-2 py-4 popup-design">
    <div class="">
        <a class="logo logo-dark">
            <span class="logo">
                <img src="../../../../../assets/images/logo-dark.svg" alt="" height="60">
            </span>
        </a>
        <!-- Light Logo-->
        <a class="logo logo-light">
            <span class="logo">
                <img src="../../../../../assets/images/logo-light.svg" alt="" height="60">
            </span>
        </a>
        <p class="text-muted mb-3 mt-3 messageStyle"> {{message}}</p>
        <div class="hstack gap-2 justify-content-center">
            <button mat-raised-button color="primary"
                class="btn btn-soft-info btn-sm material-shadow-none blueBackground ms-3 ms-3 mt-2 blueBackground p-2 bdr_radius"
                (click)="onSubmit()">
                Yes
            </button>
            <button mat-raised-button color="primary"
                class="btn btn-soft-info btn-sm material-shadow-none blueBackground ms-3 ms-3 mt-2 blueBackground p-2 bdr_radius"
                (click)="close()">
                No
            </button>
        </div>
    </div>
</div>
