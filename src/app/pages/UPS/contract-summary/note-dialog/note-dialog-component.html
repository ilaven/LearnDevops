@if(isLoading()){
<div class="loader-overlay">
  <div class="loader-content">
    <img src="../../../../../assets/images/loader.gif" alt="Loading">
  </div>
</div>}
<div class="px-2 py-4 pt-2 ">
  <div class="bg-pop-title">
    <div class="row">
      <div class="col-10">
        <h2 class="mat-dialog-title mt-2">{{ data?.noteTitle }}</h2>
      </div>
    </div>
  </div>
  <div class="row m-0 mt-2">
    <div class="col-12 p-0">
      <p class="mat-textarea mb-0">
        <mat-dialog-content class="notesTextbox">

          <!-- Toolbar -->
          <div class="toolbar">
            <button class="tool-btn" (click)="format('bold')"><b>B</b></button>
            <button class="tool-btn" (click)="format('italic')"><i>I</i></button>
            <button class="tool-btn" (click)="format('underline')"><u>U</u></button>
            <button class="tool-btn" (click)="format('insertUnorderedList')">&#8226;</button>
            <button class="tool-btn" (click)="format('insertOrderedList')">1.</button>
          </div>

          <!-- Editor -->
          <div class="editor-box" #editorBox [contentEditable]="!isLoading" dir="ltr" style="unicode-bidi: plaintext"
            (input)="onTextChange($event)">
          </div>

        </mat-dialog-content>
      </p>
    </div>

    <div class="col-12 mt-4">
      <div class="d-flex justify-content-end">
        <button mat-button (click)="closeDialog()" class="btn-cancel">Cancel</button>
        <button mat-raised-button color="primary" class="btn-save" (click)="saveNote()">Save</button>
      </div>
    </div>

  </div>



</div>
