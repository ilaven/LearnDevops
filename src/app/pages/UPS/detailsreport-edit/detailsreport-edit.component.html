<div class="row">
    <div class="col">
        <div class="px-0 py-3">
                 <div class="row header_section pb-1">
                <div class="col-12">
                    <div class="d-flex align-items-lg-center py-2  flex-lg-row flex-column">
                        <div class="col-12">
                            <h4 class="fs-16 mb-1 pageTitle">Report Description</h4>
                        </div>  
                    </div>
                </div>
            </div>
        </div>
        <div class="px-0 pt-0 py-3">
            <div class="row">
                <div class="col-lg-12">
                    <div class="card">
                        <div class="card-body p-1">
                            <div class="table-wrapper">
                                <div class="top-scroll" #topScroll (scroll)="syncScroll($event, 'top')">
                                    <div class="scroll-content"></div>
                                </div>
                                <div class="table-scroll" #tableScroll (scroll)="syncScroll($event, 'table')">
                                    <table class="metrics-table">
                                        <thead>  
                                            <tr>
                                                <th class="sticky-header">Report Name</th>
                                                <th class="sticky-header">Help Text</th>
                                                <th class="sticky-header">Updated By</th>
                                                <th class="sticky-header text-center ">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody>                                    
                                            <tr *ngFor="let datagrid_iditem of reportDescriptionResultAC; let indexValue = index;"
                                                [class.odd-row]="indexValue % 2 === 0"
                                                [class.even-row]="indexValue % 2 !== 0">

                                                <td>{{ datagrid_iditem.reportName }}</td>

                                                <td>
                                                    <mat-form-field appearance="outline" class="w-100 table-input compact-field input_change">
                                                    <input matInput placeholder="Enter report details" [(ngModel)]="datagrid_iditem.reportDescription">
                                                    </mat-form-field>
                                                </td>

                                                <td>
                                                    <mat-form-field appearance="outline" class="w-100 table-input compact-field input_change">
                                                    <input matInput placeholder="Admin" [(ngModel)]="datagrid_iditem.updatedBy">
                                                    </mat-form-field>
                                                </td>

                                                <td class="text-center">    
                                                    <button type="button" class="btn btn-info waves-light orange" 
                                                    (click)="carrierName=='UPS' ? burri_clickHandler(datagrid_iditem,indexValue) : carrierName=='OnTrac' ? burri_clickHandlerOntrac(datagrid_iditem,indexValue):burri_clickHandlerFedex(datagrid_iditem,indexValue)">Update</button>
                                                </td>

                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
